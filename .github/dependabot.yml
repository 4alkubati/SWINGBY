version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /mobile
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Expo pins react-native and friends; let `npx expo install --fix` own those.
    ignore:
      - dependency-name: react-native
      - dependency-name: react
      - dependency-name: expo*

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
