name: web-launch CI

on:
  push:
    paths:
      - 'web/launch/**'
      - '.github/workflows/web-launch-ci.yml'
  pull_request:
    paths:
      - 'web/launch/**'

defaults:
  run:
    working-directory: web/launch

jobs:
  lint-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/launch/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          VITE_API_URL: https://api.swingbyapp.ca
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_PLAUSIBLE_DOMAIN: swingbyapp.ca
        run: npm run build

      - name: Check bundle size
        run: du -sh dist/

  security-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/launch/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Audit at high+ severity. Moderate issues from transitive deps (exceljs→uuid, vite dev server)
      # are tracked but non-blocking at this stage.
      - name: Audit dependencies
        run: npm audit --audit-level=high

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        run: |
          if grep -rE "(SUPABASE_SERVICE_KEY|eyJhbGci[A-Za-z0-9+/]{20,}|sk_live_[A-Za-z0-9]+)" web/launch/ backend/app/ --include="*.js" --include="*.jsx" --include="*.ts" --include="*.tsx" --include="*.py" 2>/dev/null; then
            echo "::error::Potential secret found in source files"
            exit 1
          fi
          echo "No secrets found."
