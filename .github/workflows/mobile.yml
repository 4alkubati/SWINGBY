name: Mobile CI

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile.yml'
  push:
    branches:
      - main
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile.yml'

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doctor:
    name: doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Expo doctor
        working-directory: mobile
        run: npx --yes expo-doctor
        continue-on-error: true

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    needs: doctor
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Read package.json scripts
        id: pkg
        run: |
          echo "scripts=$(node -e "const p=require('./mobile/package.json'); console.log(JSON.stringify(p.scripts||{}))")" >> $GITHUB_OUTPUT

      - name: Run typecheck script
        if: contains(steps.pkg.outputs.scripts, '"typecheck"')
        working-directory: mobile
        run: npm run typecheck

      - name: Fallback tsc --noEmit
        if: "!contains(steps.pkg.outputs.scripts, '\"typecheck\"') && hashFiles('mobile/tsconfig.json') != ''"
        working-directory: mobile
        run: npx tsc --noEmit
