name: Backend CI

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install linters
        # Pinned: unpinned linters float to the newest release, so a brand-new
        # ruff/black version can turn CI red with zero code changes (new rules /
        # reformatting). Bump these deliberately, not by surprise.
        run: pip install ruff==0.15.22 black==26.1.0

      - name: Ruff check
        run: ruff check backend/ --output-format=github

      - name: Black check
        run: black --check backend/

  test:
    name: test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio httpx sqlparse

      - name: Run tests
        run: pytest backend/tests -q
        env:
          # Stub values: importing app.main hard-fails without these, but the
          # test suite mocks all supabase/network access so they're never used.
          DATABASE_URL: postgresql://stub:stub@localhost:5432/stub
          SUPABASE_URL: https://stub.supabase.co
          SUPABASE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoiYW5vbiJ9.stub
          SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyb2xlIjoic2VydmljZV9yb2xlIn0.stub
          SECRET_KEY: ci-test-secret
