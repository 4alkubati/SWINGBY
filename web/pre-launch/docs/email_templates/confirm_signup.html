<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Confirm your SwingBy account</title>
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; background: #07080a; color: #F4F6FA; }
    .container { max-width: 520px; margin: 0 auto; padding: 48px 24px; }
    .logo { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; color: #F4F6FA; text-decoration: none; }
    .card { background: #0F1115; border: 1px solid #1F232B; border-radius: 20px; padding: 40px 32px; margin-top: 32px; }
    h1 { font-size: 22px; font-weight: 700; margin: 0 0 12px; color: #F4F6FA; }
    p { font-size: 15px; line-height: 1.6; color: #8B92A0; margin: 0 0 24px; }
    .btn { display: inline-block; background: #6E56F7; color: #F4F6FA !important; font-size: 15px; font-weight: 600; padding: 14px 32px; border-radius: 10px; text-decoration: none; text-align: center; }
    .footer { margin-top: 40px; font-size: 12px; color: #8B92A0; text-align: center; line-height: 1.6; }
    .footer a { color: #8878F9; text-decoration: none; }
    @media (prefers-color-scheme: light) {
      body { background: #f5f5f5; color: #1a1a1a; }
      .card { background: #ffffff; border-color: #e5e5e5; }
      .logo, h1 { color: #1a1a1a; }
      p { color: #666; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="https://swingbyy.com" class="logo">SwingBy</a>
    <div class="card">
      <h1>Confirm your email</h1>
      <p>Thanks for signing up for SwingBy! Click the button below to confirm your email address and get started.</p>
      <a href="{{ .ConfirmationURL }}" class="btn">Confirm Email</a>
      <p style="margin-top: 24px; font-size: 13px;">If you didn't create a SwingBy account, you can safely ignore this email.</p>
    </div>
    <div class="footer">
      <p>&copy; SwingBy Inc. &bull; Calgary, AB, Canada</p>
      <p><a href="https://swingbyy.com/privacy">Privacy</a> &bull; <a href="https://swingbyy.com/terms">Terms</a></p>
    </div>
  </div>
</body>
</html>
