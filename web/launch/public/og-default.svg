<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#07080a"/>
  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1F232B" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Accent circle glow -->
  <circle cx="600" cy="240" r="320" fill="#6E56F7" fill-opacity="0.06"/>
  <!-- Logo mark (wrench-like S shape) -->
  <rect x="540" y="120" width="120" height="120" rx="28" fill="#2A2247"/>
  <text x="600" y="200" font-family="Arial, sans-serif" font-size="72" font-weight="700" fill="#6E56F7" text-anchor="middle">S</text>
  <!-- Wordmark -->
  <text x="600" y="310" font-family="Arial, sans-serif" font-size="64" font-weight="700" fill="#F4F6FA" text-anchor="middle" letter-spacing="-1">SwingBy</text>
  <!-- Tagline -->
  <text x="600" y="375" font-family="Arial, sans-serif" font-size="28" font-weight="400" fill="#8B92A0" text-anchor="middle">The trust layer for local services</text>
  <!-- Location pill -->
  <rect x="480" y="420" width="240" height="44" rx="22" fill="#1F232B"/>
  <text x="600" y="448" font-family="Arial, sans-serif" font-size="20" font-weight="500" fill="#6E56F7" text-anchor="middle">📍 Calgary, Alberta</text>
  <!-- Bottom domain -->
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="18" fill="#8B92A0" text-anchor="middle">swingby.ca</text>
</svg>
