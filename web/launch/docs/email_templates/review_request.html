<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>How did it go? — SwingBy</title>
  <style>
    body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;background:#07080a;color:#F4F6FA}
    .container{max-width:540px;margin:0 auto;padding:48px 24px}
    .logo{font-size:22px;font-weight:700;letter-spacing:-0.5px;color:#F4F6FA;text-decoration:none;display:block;margin-bottom:32px}
    .card{background:#0F1115;border:1px solid #1F232B;border-radius:16px;padding:36px 32px}
    h1{font-size:22px;font-weight:700;margin:0 0 12px;color:#F4F6FA}
    p{font-size:15px;line-height:1.65;color:#8B92A0;margin:0 0 20px}
    .stars{font-size:28px;margin:20px 0;letter-spacing:4px}
    .btn{display:inline-block;background:#6E56F7;color:#F4F6FA !important;font-size:15px;font-weight:600;padding:14px 32px;border-radius:10px;text-decoration:none}
    .skip{display:block;margin-top:16px;font-size:13px;color:#8B92A0;text-decoration:none}
    .skip:hover{color:#F4F6FA}
    .footer{margin-top:36px;font-size:12px;color:#8B92A0;text-align:center;line-height:1.7}
    .footer a{color:#8878F9;text-decoration:none}
    @media(prefers-color-scheme:light){body{background:#f5f5f5}.card{background:#fff;border-color:#e5e5e5}.logo,h1{color:#1a1a1a}p{color:#555}}
  </style>
</head>
<body>
  <!--preview: How did {{business_name}} do? Leave a quick review.-->
  <div class="container">
    <a href="https://swingbyy.com" class="logo">SwingBy</a>
    <div class="card">
      <h1>How did it go?</h1>
      <p>Your job with <strong style="color:#F4F6FA">{{business_name}}</strong> is complete. Reviews help other clients in Calgary make confident decisions — and they help good businesses stand out.</p>
      <p>It only takes 30 seconds.</p>
      <div class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</div>
      <a href="https://swingbyy.com/app/bookings/{{booking_id}}/review" class="btn">Leave a review</a>
      <a href="{{skip_url}}" class="skip">Skip for now</a>
    </div>
    <div class="footer">
      <p>&copy; SwingBy Inc. &bull; Calgary, AB, Canada</p>
      <p><a href="https://swingbyy.com/privacy">Privacy</a> &bull; <a href="https://swingbyy.com/terms">Terms</a></p>
    </div>
  </div>
</body>
</html>
